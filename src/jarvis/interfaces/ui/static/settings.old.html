<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Système</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/settings.css">
</head>
<body>

  <!-- ══ TOPBAR ══════════════════════════════════════════════════ -->
  <header class="topbar">
    <button class="topbar-back" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      retour
    </button>

    <span class="topbar-title">JARVIS SYSTÈME</span>

    <div class="topbar-status">
      <span class="topbar-version">v3.0</span>
      <span class="topbar-dot"></span>
      <span class="topbar-online">EN LIGNE</span>
    </div>
  </header>

  <!-- ══ LAYOUT ═════════════════════════════════════════════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
    <nav class="sidebar">
      <div class="sidebar-label">NAVIGATION</div>
      <div class="sidebar-nav">

        <button class="sidebar-item active" data-tab="sessions" onclick="switchTab('sessions')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Sessions</span>
        </button>

        <button class="sidebar-item" data-tab="memoire" onclick="switchTab('memoire')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          <span>Mémoire</span>
        </button>

        <button class="sidebar-item" data-tab="outils" onclick="switchTab('outils')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          <span>Outils</span>
        </button>

        <div class="sidebar-sep"></div>

        <button class="sidebar-item" data-tab="conso" onclick="switchTab('conso')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span>Conso</span>
        </button>

        <button class="sidebar-item" data-tab="params" onclick="switchTab('params')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
          <span>Paramètres</span>
        </button>

        <div class="sidebar-sep"></div>

        <button class="sidebar-item" data-tab="systeme" onclick="switchTab('systeme')">
          <svg class="sidebar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8m-4-4v4"/>
          </svg>
          <span>Système</span>
        </button>

      </div>

      <div class="unsaved-indicator" id="unsaved-indicator"></div>
    </nav>

    <!-- ── MAIN CONTENT ─────────────────────────────────────────── -->
    <main class="main-content">
      <div id="tab-content"></div>
    </main>

  </div>

  <!-- ══ MODAL — Visionneuse fichier ════════════════════════════ -->
  <div id="file-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <div class="modal-hd">
        <span class="modal-name" id="file-modal-name"></span>
        <button class="modal-close" onclick="closeFileModal()">✕</button>
      </div>
      <div class="modal-body" id="file-modal-body"></div>
      <div class="modal-ft">
        <button class="btn" id="file-modal-raw">⊞ RAW</button>
        <button class="btn" onclick="closeFileModal()">Fermer</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL — ClawHub ════════════════════════════════════════ -->
  <div id="clawhub-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <div class="modal-hd">
        <span class="modal-name">✦ CLAWHUB MARKETPLACE</span>
        <button class="modal-close" onclick="closeClawHub()">✕</button>
      </div>
      <div class="modal-search-wrap">
        <input id="clawhub-search" class="modal-search" placeholder="Rechercher un skill…">
      </div>
      <div id="clawhub-results" style="overflow-y:auto;max-height:340px"></div>
    </div>
  </div>

  <!-- ══ TOASTS ═════════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="/settings.js"></script>
</body>
</html>
