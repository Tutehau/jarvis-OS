name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    # Permet de déclencher manuellement les workflows de la branche cible
    # via l'UI Actions (bouton "Run workflow") ou `gh workflow run`. Ajouté
    # isolément avant le merge F.7 pour activer B9 cold-install (qui vit sur
    # refonte/architecture-couches) sans devoir merger d'abord. Remplacé
    # par le ci.yml complet de la refonte au moment du merge F.7.

jobs:
  lint-and-test:
    name: Lint & Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # dlib (face-recognition) : sdist uniquement, nécessite cmake + openblas.
      # pyaudio (RealtimeSTT)   : sdist uniquement, nécessite portaudio headers.
      # libgl1                  : opencv runtime.
      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libopenblas-dev \
            liblapack-dev \
            portaudio19-dev \
            libgl1 \
            python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q
